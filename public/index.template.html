<!doctype html>
<html lang="pt-BR">

  <title>Sistema Integrado Sulnet - Teste Web v22</title>
  <style>
:root{
  --bg:#f6f7fb;--card:#fff;--ink:#161923;--muted:#6b7280;--line:#e6e8ee;--soft:#f8fafc;

  --shadow:0 18px 55px rgba(15,23,42,.10);--radius:16px;
}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}
button,input,select,textarea{font:inherit}button{cursor:pointer}a{text-decoration:none;color:inherit}.hidden{display:none!important}
.small{font-size:12px;color:var(--muted)}.muted{color:var(--muted)}.mt6{margin-top:6px}.mt10{margin-top:10px}.mt14{margin-top:14px}.mt18{margin-top:18px}.mb0{margin-bottom:0}.w100{width:100%}.right{text-align:right}
hr{border:0;border-top:1px solid var(--line);margin:18px 0}.nowrap{white-space:nowrap}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
/* Login */
.login{min-height:100vh;display:grid;grid-template-columns:1.08fr .92fr;background:#fff}.login-brand{position:relative;overflow:hidden;padding:58px;display:flex;flex-direction:column;justify-content:space-between;color:#fff;background:radial-gradient(circle at 16% 18%,rgba(239,63,10,.26),transparent 30%),linear-gradient(145deg,#05070b,#111827 56%,#020202)}.login-brand:after{content:"";position:absolute;width:520px;height:520px;border-radius:999px;background:rgba(239,63,10,.12);right:-180px;bottom:-230px}.login-logo{width:220px;max-width:80%;background:#000;border-radius:12px}.login-title{position:relative;z-index:1;max-width:620px}.login-title h1{font-size:52px;line-height:1.02;margin:28px 0 16px;letter-spacing:-1.7px}.login-title h1 span{color:var(--orange2)}.login-title p{font-size:17px;line-height:1.6;color:#cbd5e1}.login-foot{position:relative;z-index:1;color:#8f98a8;font-size:12px}.login-panel{display:flex;align-items:center;justify-content:center;padding:36px;background:linear-gradient(180deg,#fff,#f8fafc)}.login-card{width:100%;max-width:430px;background:#fff;border:1px solid var(--line);border-radius:26px;padding:32px;box-shadow:var(--shadow)}.login-card h2{font-size:29px;margin:0 0 7px}.login-card p{margin:0 0 22px;color:var(--muted)}.demo-users{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}.demo-users button{border:1px solid var(--line);border-radius:12px;background:#fff;padding:10px;color:#374151;font-size:12px}.demo-users button:hover{border-color:var(--orange);color:var(--orange)}
/* Header */
.app{min-height:100vh}.platform-header{height:62px;background:#080d18;color:#e5e7eb;display:flex;align-items:center;justify-content:space-between;padding:0 18px;position:sticky;top:0;z-index:30;box-shadow:0 1px 0 rgba(255,255,255,.07)}.brand{display:flex;align-items:center;gap:10px;min-width:260px}.brand img{height:31px;width:31px;border-radius:8px;object-fit:cover}.brand strong{font-size:14px}.brand span{font-size:11px;color:#9ca3af;display:block}.modules{display:flex;align-items:center;height:100%;gap:2px}.module-btn{height:62px;border:0;background:transparent;color:#aeb7c5;padding:0 18px;display:flex;align-items:center;gap:8px;font-weight:800;font-size:12px;position:relative}.module-btn:hover,.module-btn.active{background:rgba(255,255,255,.06);color:#fff}.module-btn.active:after{content:"";height:3px;background:var(--orange);position:absolute;left:14px;right:14px;bottom:0;border-radius:4px 4px 0 0}.userbox{display:flex;align-items:center;gap:10px;min-width:245px;justify-content:flex-end}.avatar{height:34px;width:34px;border-radius:999px;background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;font-weight:900;display:flex;align-items:center;justify-content:center}.userbox small{display:block;color:#9ca3af}.logout{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:#e5e7eb;border-radius:10px;padding:8px 10px}.logout:hover{background:rgba(255,255,255,.1)}
.main{max-width:1540px;margin:0 auto;padding:20px}.subbar{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;margin-bottom:14px}.subbar h1{font-size:23px;letter-spacing:-.5px;margin:0}.subbar p{margin:4px 0 0;color:var(--muted);font-size:13px}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{border:1px solid var(--line);background:#fff;border-radius:11px;padding:9px 13px;font-weight:800;font-size:12px;color:#475569}.tab.active,.tab:hover{border-color:var(--orange);color:var(--orange);background:#fff7ed}.range-tabs{display:flex;gap:4px;align-items:center}.range-tabs button{border:0;background:transparent;color:#6b7280;font-size:12px;padding:7px 10px;border-radius:9px}.range-tabs button.active{background:var(--orange);color:#fff;font-weight:850}.range-date{border:1px solid var(--line);border-radius:9px;padding:6px 8px;font-size:12px;color:#374151;background:#fff}.range-sep{font-size:11px;color:#9ca3af;padding:0 2px}
/* Cards KPI */
.panel{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 1px 2px rgba(15,23,42,.03)}.kpi-panel{padding:15px 16px;margin-bottom:14px}.panel-title{display:flex;align-items:center;gap:8px;font-weight:850;font-size:12px;text-transform:uppercase;letter-spacing:.03em;color:#374151;margin-bottom:12px}.kpis{display:grid;grid-template-columns:repeat(5,1fr);border:1px solid var(--line);border-radius:13px;overflow:hidden}.kpi{padding:14px 16px;background:#fff;border-right:1px solid var(--line);min-height:80px}.kpi:last-child{border-right:0}.kpi small{display:block;font-size:10px;font-weight:900;text-transform:uppercase;color:#9ca3af}.kpi strong{display:block;font-size:24px;margin-top:8px;letter-spacing:-.6px}.kpi span{display:block;margin-top:2px;color:#9ca3af;font-size:11px}.kpi .orange{color:var(--orange)}
.toolbar{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.input,.select,.field input,.field select,.field textarea{border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);padding:11px 12px;outline:none}.input:focus,.select:focus,.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--orange);box-shadow:0 0 0 4px rgba(239,63,10,.10)}.field textarea{min-height:90px;resize:vertical}.search{min-width:310px}.btn{border:0;border-radius:12px;padding:10px 14px;font-weight:850;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:.15s}.btn-primary{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;box-shadow:0 8px 20px rgba(239,63,10,.22)}.btn-primary:hover{transform:translateY(-1px)}.btn-dark{background:#111827;color:#fff}.btn-light{border:1px solid var(--line);background:#fff;color:#374151}.btn-light:hover{background:#f8fafc;border-color:#cbd5e1}.btn-green{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}.btn-red{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}.btn-warn{background:#ffedd5;color:#9a3412;border:1px solid #fed7aa}.btn-sm{padding:7px 10px;border-radius:10px;font-size:12px}
/* Kanban */
.kanban{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(255px,1fr);gap:12px;overflow-x:auto;padding-bottom:16px}.stage{background:#fff;border:1px solid var(--line);border-radius:15px;min-height:420px;display:flex;flex-direction:column}.stage-head{display:flex;align-items:flex-start;justify-content:space-between;padding:13px;border-bottom:1px solid var(--line)}.stage-head h3{margin:0;font-size:13px;text-transform:uppercase;letter-spacing:.02em}.stage-head small{display:block;color:#9ca3af;margin-top:4px}.stage-actions{display:flex;gap:7px;align-items:center}.count-dot{height:22px;min-width:22px;border-radius:999px;background:#f1f5f9;color:#475569;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center}.plus-mini{height:22px;width:22px;border-radius:7px;border:1px solid var(--line);background:#fff;color:#6b7280}.dropzone{padding:10px;display:flex;flex-direction:column;gap:8px;flex:1}.dropzone.dragover{background:#fff7ed}.empty-stage{border:1px dashed var(--line);border-radius:13px;color:#b2bac8;text-align:center;padding:28px 8px;font-size:12px;margin-top:4px}.opp-card{background:#fff;border:1px solid #e9ebf0;border-radius:13px;padding:11px 12px;box-shadow:0 2px 10px rgba(15,23,42,.04);cursor:pointer}.opp-card:hover{border-color:#f5a07e;box-shadow:0 8px 25px rgba(15,23,42,.08)}.opp-card h4{margin:0;font-size:13px}.opp-card .client{font-size:12px;color:#374151;margin-top:6px}.opp-card .doc{font-size:11px;color:#9ca3af;margin-top:2px}.opp-card .value{font-size:12px;color:var(--orange);font-weight:900;text-align:right;margin-top:7px}.card-top{display:flex;justify-content:space-between;gap:8px}.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}.tag{display:inline-flex;border-radius:999px;padding:3px 7px;font-size:10px;font-weight:850;background:#f1f5f9;color:#475569}.tag.orange{background:#fff7ed;color:var(--orange)}.tag.green{background:#dcfce7;color:#166534}.tag.red{background:#fee2e2;color:#991b1b}.tag.blue{background:#dbeafe;color:#1d4ed8}.tag.purple{background:#f3e8ff;color:#6b21a8}.status-pill{display:inline-flex;border-radius:999px;padding:4px 8px;font-size:10px;font-weight:900}.status-open{background:#dbeafe;color:#1d4ed8}.status-won{background:#dcfce7;color:#166534}.status-lost{background:#fee2e2;color:#991b1b}.status-frozen{background:#fef3c7;color:#92400e}
/* Tables/forms */
.grid{display:grid;gap:14px}.grid.two{grid-template-columns:1fr 1fr}.grid.three{grid-template-columns:repeat(3,1fr)}.grid.four{grid-template-columns:repeat(4,1fr)}.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:18px}.card h3{margin:0 0 12px;font-size:16px}.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}.field{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}.field.full{grid-column:1/-1}.field label{font-size:12px;font-weight:850;color:#374151}.field small{font-size:11px;color:#9ca3af}.cep-status.ok{color:#166534}.cep-status.err{color:#991b1b}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form-row.three{grid-template-columns:repeat(3,1fr)}.form-row.four{grid-template-columns:repeat(4,1fr)}.checkbox-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.check-tile{border:1px solid var(--line);border-radius:12px;padding:10px;display:flex;gap:8px;align-items:flex-start;background:#fff}.check-tile input{margin-top:2px}.doc-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px}.doc-toggle button{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px;font-weight:850}.doc-toggle button.active{background:var(--orange);border-color:var(--orange);color:#fff}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:15px;background:#fff}table{border-collapse:separate;border-spacing:0;width:100%;min-width:960px}th,td{text-align:left;padding:12px 13px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}th{position:sticky;top:0;background:#f9fafb;color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:.06em;z-index:1}tr:last-child td{border-bottom:0}tr:hover td{background:#fcfcfd}.clickable{cursor:pointer}.clickable:hover{color:var(--orange)}.empty{padding:34px;color:#9ca3af;text-align:center}.badge{display:inline-flex;border-radius:999px;padding:5px 9px;font-size:11px;font-weight:900;border:1px solid transparent;white-space:nowrap}.b-enviado{background:#dbeafe;color:#1d4ed8;border-color:#bfdbfe}.b-analise{background:#fef3c7;color:#92400e;border-color:#fde68a}.b-aprovado{background:#dcfce7;color:#166534;border-color:#bbf7d0}.b-reprovado{background:#fee2e2;color:#991b1b;border-color:#fecaca}.b-contestacao{background:#f3e8ff;color:#6b21a8;border-color:#e9d5ff}.risk{display:inline-flex;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:900}.risk-baixo{background:#dcfce7;color:#166534}.risk-medio{background:#fef3c7;color:#92400e}.risk-alto{background:#ffedd5;color:#9a3412}.risk-critico{background:#fee2e2;color:#991b1b}.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.info-item span{display:block;font-size:10px;font-weight:900;color:#9ca3af;text-transform:uppercase}.info-item strong{display:block;margin-top:3px;font-size:14px}.history{display:flex;flex-direction:column;gap:9px}.history-item{position:relative;padding-left:16px;font-size:13px}.history-item:before{content:"";position:absolute;left:0;top:5px;width:8px;height:8px;border-radius:50%;background:var(--orange)}.history-item small{display:block;color:#9ca3af;margin-top:2px}.score-line{height:10px;background:#f1f5f9;border-radius:999px;overflow:hidden}.score-line div{height:100%;background:linear-gradient(90deg,#ef4444,#f59e0b,#22c55e)}.filebox{border:1px dashed #cbd5e1;background:#f8fafc;border-radius:12px;padding:11px;color:#64748b}.mini-metric{border:1px solid var(--line);border-radius:15px;padding:14px;background:#fff}.mini-metric small{font-size:11px;color:#9ca3af;text-transform:uppercase;font-weight:900}.mini-metric strong{display:block;font-size:26px;margin-top:6px}.bar-list{display:flex;flex-direction:column;gap:10px}.bar-row{display:grid;grid-template-columns:160px 1fr 44px;gap:10px;align-items:center;font-size:13px}.bar-bg{height:10px;border-radius:999px;background:#f1f5f9;overflow:hidden}.bar-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--orange2));min-width:3px}.admin-list{display:flex;flex-direction:column;gap:8px}.list-item{display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid var(--line);border-radius:13px;padding:11px;background:#fff}.pill{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:4px 8px;font-size:11px;font-weight:850;background:#f9fafb;color:#475569}.toast{position:fixed;right:20px;bottom:20px;background:#111827;color:#fff;border-radius:14px;padding:13px 16px;box-shadow:var(--shadow);z-index:200;animation:pop .18s ease}.toast.success{background:#166534}.toast.error{background:#991b1b}.toast.warn{background:#92400e}@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* Modal */
.modal-back{position:fixed;inset:0;background:rgba(2,6,23,.60);display:flex;align-items:center;justify-content:center;padding:18px;z-index:100}.modal{width:100%;max-width:880px;max-height:92vh;overflow:auto;background:#fff;border-radius:20px;box-shadow:0 25px 80px rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.4)}.modal.small{max-width:570px}.modal-head{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:2;border-radius:20px 20px 0 0}.modal-head h2{margin:0;font-size:18px}.modal-body{padding:20px}.x{height:34px;width:34px;border:1px solid var(--line);background:#fff;border-radius:10px}.footer-actions{display:flex;justify-content:flex-end;gap:9px;margin-top:18px}.section-title{font-size:13px;font-weight:950;text-transform:uppercase;letter-spacing:.04em;color:#374151;border-bottom:1px solid var(--line);padding-bottom:8px;margin:16px 0 12px}.close-on-mobile{display:none}
@media(max-width:1050px){.platform-header{height:auto;min-height:62px;flex-wrap:wrap;padding:10px}.brand,.userbox{min-width:auto}.modules{order:3;width:100%;overflow:auto;height:50px}.module-btn{height:50px;white-space:nowrap}.main{padding:14px}.kpis{grid-template-columns:repeat(2,1fr)}.kpi{border-bottom:1px solid var(--line)}.grid.four,.grid.three,.grid.two{grid-template-columns:1fr 1fr}.kanban{grid-auto-columns:minmax(260px,75vw)}}
@media(max-width:720px){.login{grid-template-columns:1fr}.login-brand{padding:30px;min-height:330px}.login-title h1{font-size:36px}.login-panel{padding:18px}.login-card{padding:24px}.demo-users{grid-template-columns:1fr}.subbar,.toolbar{align-items:stretch;flex-direction:column}.search{min-width:100%;width:100%}.kpis,.grid.four,.grid.three,.grid.two,.form-row,.form-row.three,.form-row.four,.checkbox-grid,.info-grid{grid-template-columns:1fr}.range-tabs{overflow:auto}.bar-row{grid-template-columns:110px 1fr 32px}.modal-back{padding:0;align-items:flex-end}.modal{max-height:96vh;border-radius:20px 20px 0 0}.modal-head{border-radius:20px 20px 0 0}.userbox div:not(.avatar){display:none}.brand strong{display:none}}
/* Categorias e produtos */
.list-item.stack{align-items:flex-start}.product-line{border-top:1px solid var(--line);padding:7px 0;display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.product-line:first-child{border-top:0}.product-line span{font-size:12px;line-height:1.35}.product-line small{white-space:nowrap;color:var(--muted);font-size:11px}
/* Campos dinâmicos por produto */
.product-fields{border:1px solid #fed7aa;background:#fffaf5;border-radius:15px;padding:14px;margin:14px 0 4px}.product-fields.hidden{display:none!important}.inline-options{display:flex;gap:10px;flex-wrap:wrap}.inline-options label{display:flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;border-radius:12px;padding:9px 11px;font-weight:800;font-size:12px;color:#374151}.inline-options input{margin:0}.field.hidden{display:none!important}.section-title.compact{margin-top:10px}.mb-product{margin-bottom:12px}

/* Administração de funis e etapas */
.item-actions{display:flex;gap:6px;align-items:center;justify-content:flex-end;flex-wrap:wrap}
.admin-entity-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;width:100%}
.stage-admin-list{width:100%;margin-top:12px;border-top:1px solid var(--line)}
.stage-admin-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.stage-admin-row:last-child{border-bottom:0}
.stage-admin-name{display:flex;align-items:flex-start;gap:9px;min-width:0}
.stage-admin-name strong{font-size:12px;text-transform:uppercase}
.stage-admin-name small{display:block;color:var(--muted);font-size:11px;margin-top:2px}
.stage-dot{width:10px;height:10px;border-radius:999px;margin-top:4px;flex:0 0 auto}
@media(max-width:900px){.admin-entity-head,.stage-admin-row{flex-direction:column;align-items:flex-start}.item-actions{justify-content:flex-start}.grid.two{grid-template-columns:1fr}}

  
  .attachments-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
  .upload-card{border:1px solid var(--line);border-radius:14px;background:#fff;padding:14px;display:flex;flex-direction:column;gap:10px;min-height:158px;box-shadow:0 8px 24px rgba(15,23,42,.04)}
  .upload-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}

  .btn-xs{padding:6px 10px;font-size:12px;border-radius:10px}
  .preview-modal{max-width:980px}
  .preview-wrap{padding:4px 0 0}
  .preview-media{width:100%;max-height:72vh;border:1px solid var(--line);border-radius:14px;background:#f8fafc;object-fit:contain}
  .preview-iframe{width:100%;height:72vh;border:1px solid var(--line);border-radius:14px;background:#fff}
  @media (max-width: 980px){.attachments-grid{grid-template-columns:1fr}}


  .mini-metric strong{word-break:break-word}
  .metric-short-name{font-size:20px;line-height:1.25}


  .calendar-toolbar{display:flex;gap:10px;align-items:end;flex-wrap:wrap}
  .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff}
  .calendar-weekday{background:#f8fafc;padding:10px;font-weight:800;font-size:12px;color:var(--muted);border-right:1px solid var(--line);text-transform:uppercase}
  .calendar-day{min-height:128px;padding:10px;border-top:1px solid var(--line);border-right:1px solid var(--line);background:#fff;position:relative}
  .calendar-day.muted{background:#f9fafb;color:#94a3b8}

  .day-number{font-weight:800;margin-bottom:8px}
  .event-chip{display:block;width:100%;text-align:left;border:0;border-radius:10px;padding:7px 8px;margin:5px 0;background:#fff4ed;color:#9a3412;font-size:12px;font-weight:700;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .event-chip.google{background:#eef6ff;color:#1d4ed8}
  .agenda-list{display:flex;flex-direction:column;gap:10px}
  .agenda-item{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff;display:flex;justify-content:space-between;gap:12px}

  function clone(o){return JSON.parse(JSON.stringify(o))}
  function digits(v){return String(v||'').replace(/\D/g,'')}
  function num(v){
    if(typeof v==='number')return Number.isFinite(v)?v:0;
    if(v===null||v===undefined)return 0;
    let s=String(v).trim();
    if(!s)return 0;
    s=s.replace(/[^0-9,.-]/g,'');

  }

  async function lookupCep(input){
    const cep=digits(input?.value||''); if(cep.length!==8)return;
    const form=input.closest('form'); cepStatus(form,'Buscando endereço pelo CEP...');
    try{
      const res=await fetch(`https://viacep.com.br/ws/${cep}/json/`);
      if(!res.ok)throw new Error('Falha ao consultar CEP');
      const data=await res.json();
      if(data.erro)throw new Error('CEP não encontrado');
      setFieldValue(form,'street',data.logradouro||'');
      setFieldValue(form,'neighborhood',data.bairro||'');
      setFieldValue(form,'city',data.localidade||'');
      setFieldValue(form,['uf','state'],data.uf||'');
      cepStatus(form,'Endereço preenchido automaticamente pelo CEP.','ok');
    }catch(err){
      cepStatus(form,'Não consegui localizar esse CEP. Confira o número ou preencha manualmente.','err');
    }
  }
  function analysisDate(req){return req?.bko?.analyzedAt||req?.updatedAt||req?.createdAt||''}
  function daysSince(dateValue){const t=new Date(dateValue).getTime();if(!t)return Infinity;return (Date.now()-t)/(1000*60*60*24)}
  function isRecentAnalysis(req,days=30){return daysSince(analysisDate(req))<=days}
  function findRecentAnalysis(st,doc,days=30,excludeId=null){
    const d=digits(doc); if(d.length<11)return null;
    return (st.analysisRequests||[])
      .filter(r=>digits(r.cpf)===d && (!excludeId || Number(r.id)!==Number(excludeId)) && isRecentAnalysis(r,days))
      .sort((a,b)=>new Date(analysisDate(b))-new Date(analysisDate(a)))[0]||null;
  }
  function findLatestAnalysis(st,doc){
    const d=digits(doc); if(d.length<11)return null;
    return (st.analysisRequests||[])
      .filter(r=>digits(r.cpf)===d)
      .sort((a,b)=>new Date(analysisDate(b))-new Date(analysisDate(a)))[0]||null;
  }
  function analysisHintText(st,doc){
    const d=digits(doc); if(d.length<11)return 'Digite o CPF/CNPJ para verificar a base de consultas dos últimos 30 dias.';
    const recent=findRecentAnalysis(st,doc,30);
    if(recent){
      const score=recent.bko?.score?` • Score ${recent.bko.score}`:'';
      return `CPF/CNPJ consultado nos últimos 30 dias: ${recent.protocol} • ${recent.status}${score}. A base será reutilizada automaticamente.`;
    }
    const latest=findLatestAnalysis(st,doc);
    if(latest)return `Última consulta encontrada em ${fmtDate(analysisDate(latest))}, mas está fora dos 30 dias. Ao salvar, será criada nova análise.`;
    return 'Nenhuma consulta nos últimos 30 dias. Ao salvar, será criada nova análise de crédito.';
  }
  function updateDocAnalysisHint(input){
    const form=input?.closest('form'); const hint=form?.querySelector('[data-doc-analysis-hint]');
    if(hint)hint.textContent=analysisHintText(getState(),input.value);
  }
  function requiredDocLength(form){
    const docType=(form?.querySelector('input[name="documentType"]')?.value||form?.querySelector('select[name="docType"]')?.value||'cpf').toLowerCase();
    return docType==='cnpj'?14:11;
  }
  function setIfEmpty(form,names,value){
    names=[].concat(names);
    const input=names.map(n=>form?.querySelector(`[name="${n}"]`)).find(Boolean);
    if(input && (input.value===''||input.value===null||input.value===undefined) && value!==undefined && value!==null && value!=='')input.value=value;
  }
  function applyRecentAnalysisToForm(input){
    const form=input?.closest('form'); if(!form)return null;
    const doc=digits(input.value); if(doc.length<requiredDocLength(form))return null;
    const req=findRecentAnalysis(getState(),doc,30);
    if(!req){delete form.dataset.recentAnalysisId;return null;}
    form.dataset.recentAnalysisId=req.id;
    setIfEmpty(form,['clientName'],req.clientName);
    setIfEmpty(form,['clientPhone'],req.clientPhone);
    setIfEmpty(form,['clientBirthDate'],req.clientBirthDate);
    setIfEmpty(form,['cep'],req.cep);
    setIfEmpty(form,['street'],req.street);
    setIfEmpty(form,['addressNumber','number'],req.number);
    setIfEmpty(form,['neighborhood'],req.neighborhood);
    setIfEmpty(form,['city'],req.city);
    setIfEmpty(form,['uf','state'],req.state);
    const productField=form.querySelector('[name="product"]');
    if(productField && !productField.value && req.product)productField.value=req.product;
    return req;
  }
  function riskByScore(score){score=Number(score||0);if(score>=700)return 'Baixo';if(score>=500)return 'Médio';if(score>=300)return 'Alto';return 'Crítico'}
  function statusClass(s){s=String(s||'').toLowerCase();if(s.includes('aprov')||s.includes('liberado'))return 'b-aprovado';if(s.includes('reprov'))return 'b-reprovado';if(s.includes('contesta'))return 'b-contestacao';if(s.includes('análise')||s.includes('analise'))return 'b-analise';return 'b-enviado'}
  function analysisStatusBadge(s){return `<span class="badge ${statusClass(s)}">${esc(s||'Sem análise')}</span>`}
  function riskBadge(r){if(!r)return '<span class="muted">-</span>'; const c={'Baixo':'risk-baixo','Médio':'risk-medio','Alto':'risk-alto','Crítico':'risk-critico'}[r]||'risk-medio'; return `<span class="risk ${c}">${esc(r)}</span>`}

  function migrateState(st){
    const base=seed();
    if(!st||typeof st!=='object')return base;
    let changed=false;
    ['users','funnels','stages','origins','products','plans','tags','outcomeReasons','opportunities','analysisRequests','calendarEvents'].forEach(k=>{
      if(!Array.isArray(st[k])){st[k]=base[k]||[];changed=true;}
    });
    st.counters=Object.assign({},base.counters,st.counters||{});if(!st.googleCalendarConfig||typeof st.googleCalendarConfig!=='object')st.googleCalendarConfig=base.googleCalendarConfig||{};if(!st.googleCalendarApp||typeof st.googleCalendarApp!=='object')st.googleCalendarApp={calendarId:'primary',syncMode:'Ler eventos'};
    function ensureByName(key,items){
      items.forEach(item=>{
        const exists=(st[key]||[]).some(x=>normName(x.name)===normName(item.name));
        if(!exists){const copy=Object.assign({},item);copy.id=nextIdFor(key);st[key].push(copy);changed=true;}
      });
    }
    function nextIdFor(key){
      const map={users:'user',funnels:'funnel',stages:'stage',origins:'origin',products:'product',plans:'plan',tags:'tag',outcomeReasons:'outcome',opportunities:'opp',analysisRequests:'analysis',calendarEvents:'calendar'};
      const ck=map[key]||key;
      const max=Math.max(0,...(st[key]||[]).map(x=>Number(x.id)||0),Number(st.counters[ck]||0));
      st.counters[ck]=max+1;
      return st.counters[ck];
    }
    // v19: não recria automaticamente cadastros apagados ou renomeados pelo administrador.
    // Os dados padrão entram apenas quando a base ainda não tem aquele cadastro, evitando a sensação de que o sistema "não grava" edições/exclusões.
    if(!st.products.length){st.products=clone(base.products||[]);changed=true;}
    if(!st.plans.length){st.plans=clone(base.plans||[]);changed=true;}
    if(!st.tags.length){st.tags=clone(base.tags||[]);changed=true;}
    if(!st.origins.length){st.origins=clone(base.origins||[]);changed=true;}
    if(!st.outcomeReasons.length){st.outcomeReasons=clone(base.outcomeReasons||[]);changed=true;}
    // Normaliza estruturas antigas para evitar tela em branco.
    st.users.forEach(u=>{if(u.active===undefined)u.active=true;if(!u.password)u.password='comercial123';if(!Array.isArray(u.funnelAccessIds)||!u.funnelAccessIds.length){u.funnelAccessIds=defaultFunnelAccessForUser(st,u);changed=true;}else{const clean=normalizeIdArray(u.funnelAccessIds);if(String(clean)!==String(u.funnelAccessIds)){u.funnelAccessIds=clean;changed=true;}}});
    st.funnels.forEach((f,i)=>{if(f.active===undefined)f.active=true;if(!f.sortOrder)f.sortOrder=i+1});
    st.stages.forEach((s,i)=>{if(!s.sortOrder)s.sortOrder=i+1;if(!s.color)s.color='#ef3f0a'});
    st.origins.forEach(o=>{if(o.active===undefined)o.active=true});
    st.products.forEach((c,i)=>{if(c.active===undefined)c.active=true;if(!c.sortOrder)c.sortOrder=i+1});
    st.plans.forEach(p=>{if(p.active===undefined)p.active=true;if(!Array.isArray(p.tags))p.tags=[];if(!p.categoryId&&p.productType){const legacy={'fibra':'FIBRA','movel':'TELEFONIA MÓVEL','fixo':'TELEFONIA FIXA','tv':'TV'}[p.productType];const cat=st.products.find(c=>normName(c.name)===normName(legacy));if(cat){p.categoryId=cat.id;changed=true;}}});
    st.tags.forEach(t=>{if(t.active===undefined)t.active=true;if(!t.color)t.color='orange'});
    st.outcomeReasons.forEach(r=>{if(!r.type)r.type='lost'});
    st.opportunities.forEach(o=>{
      if(!Array.isArray(o.planIds))o.planIds=o.planId?[Number(o.planId)]:[];
      if(!Array.isArray(o.tagIds))o.tagIds=[];
      if(!Array.isArray(o.history))o.history=[];
      if(!o.status)o.status='open';
      if(!o.createdAt)o.createdAt=new Date().toISOString();
      if(!o.updatedAt)o.updatedAt=o.createdAt;
      if(!o.productInfo)o.productInfo={};
      if(!Array.isArray(o.prospectNotes))o.prospectNotes=[];
      if(!o.categoryId&&o.planIds.length){const p=st.plans.find(x=>Number(x.id)===Number(o.planIds[0]));if(p?.categoryId)o.categoryId=Number(p.categoryId);}
    });
    st.analysisRequests.forEach(r=>{if(!Array.isArray(r.history))r.history=[];if(!r.status)r.status='Enviado';if(!r.createdAt)r.createdAt=new Date().toISOString();if(!r.updatedAt)r.updatedAt=r.createdAt});
    st.calendarEvents.forEach(ev=>{if(!ev.id){st.counters.calendar=(st.counters.calendar||0)+1;ev.id=st.counters.calendar;}if(!ev.type)ev.type='Compromisso';if(!ev.status)ev.status='Confirmado';if(!ev.source)ev.source='local';if(!ev.createdAt)ev.createdAt=ev.start||new Date().toISOString();});
    ['user','funnel','stage','origin','product','plan','tag','outcome','opp','analysis','calendar'].forEach(k=>{if(!Number.isFinite(Number(st.counters[k])))st.counters[k]=base.counters[k]||0});
    st.counters.user=Math.max(st.counters.user,...st.users.map(x=>Number(x.id)||0));
    st.counters.funnel=Math.max(st.counters.funnel,...st.funnels.map(x=>Number(x.id)||0));
    st.counters.stage=Math.max(st.counters.stage,...st.stages.map(x=>Number(x.id)||0));
    st.counters.origin=Math.max(st.counters.origin,...st.origins.map(x=>Number(x.id)||0));
    st.counters.product=Math.max(st.counters.product,...st.products.map(x=>Number(x.id)||0));
    st.counters.plan=Math.max(st.counters.plan,...st.plans.map(x=>Number(x.id)||0));
    st.counters.tag=Math.max(st.counters.tag,...st.tags.map(x=>Number(x.id)||0));
    st.counters.outcome=Math.max(st.counters.outcome,...st.outcomeReasons.map(x=>Number(x.id)||0));
    st.counters.opp=Math.max(st.counters.opp,...st.opportunities.map(x=>Number(x.id)||0));
    st.counters.analysis=Math.max(st.counters.analysis,...st.analysisRequests.map(x=>Number(x.id)||0));
    st.counters.calendar=Math.max(st.counters.calendar||0,...(st.calendarEvents||[]).map(x=>Number(x.id)||0));
    if(changed)localStorage.setItem(STORAGE_KEY,JSON.stringify(st));
    return st;
  }
  function safeWriteState(st){
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify(st));window.__sulnetLastSaveError='';window.__sulnetLastSaveAt=new Date().toISOString();return true}
    catch(e){console.error('Falha ao gravar base local.',e);window.__sulnetLastSaveError=e?.message||String(e);return false}
  }
  function readFirstAvailableState(){
    const keys=[STORAGE_KEY,...LEGACY_STORAGE_KEYS];
    for(const key of keys){
      const raw=localStorage.getItem(key);
      if(raw){try{return {key,state:JSON.parse(raw)}}catch(e){console.warn('Base local inválida em '+key,e)}}
    }
    return null;
  }
  function getState(){
    const loaded=readFirstAvailableState();
    if(!loaded){const fresh=seed();safeWriteState(fresh);return fresh}
    try{const migrated=migrateState(loaded.state);if(loaded.key!==STORAGE_KEY)safeWriteState(migrated);return migrated}
    catch(e){console.error('Falha ao carregar base local. Restaurando demonstração.',e);const fresh=seed();safeWriteState(fresh);return fresh}
  }
  function setState(s){const migrated=migrateState(s);if(!safeWriteState(migrated)){toast('Não foi possível gravar no navegador. Verifique se o armazenamento local está bloqueado.','error')}return migrated}

  function getUser(){const id=Number(sessionStorage.getItem(SESSION_KEY)||localStorage.getItem(SESSION_KEY)||0);if(!id)return null;return getState().users.find(u=>u.id===id&&u.active)||null}

  function allowedModule(user,module){const m=modules.find(x=>x.id===module);return m&&m.roles.includes(user.role)}

  function normalizeIdArray(v){return (Array.isArray(v)?v:String(v||'').split(',')).map(Number).filter(n=>Number.isFinite(n)&&n>0)}
  function sortedActiveFunnels(st){return (st.funnels||[]).filter(f=>f.active!==false).sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0))}
  function defaultFunnelAccessForUser(st,user){
    const all=sortedActiveFunnels(st).map(f=>Number(f.id));
    if(!user)return all;
    if(['admin','gerencia'].includes(user.role))return all;
    if(user.role==='bko'){
      const bko=(st.funnels||[]).find(f=>normName(f.name).includes('BACKOFFICE')||normName(f.name).includes('BACKOOFICE'));
      return bko?[Number(bko.id)]:(all.length?[all[0]]:[]);
    }
    const commercial=sortedActiveFunnels(st).filter(f=>!(normName(f.name).includes('BACKOFFICE')||normName(f.name).includes('BACKOOFICE')));
    return commercial.length?[Number(commercial[0].id)]:all;
  }
  function userFunnelAccessIds(st,user){

    const allowed=base.filter(id=>activeIds.includes(Number(id)));
    return allowed.length?allowed:activeIds;
  }

  function startOfDay(d){const x=new Date(d);x.setHours(0,0,0,0);return x}
  function endOfDay(d){const x=new Date(d);x.setHours(23,59,59,999);return x}
  function ymd(d){return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10)}
  function rangeBounds(){
    const today=startOfDay(new Date());let start=startOfDay(today),end=endOfDay(today);
    if(ui.range==='ontem'){start=startOfDay(today);start.setDate(start.getDate()-1);end=endOfDay(start)}
    if(ui.range==='semana'){start=startOfDay(today);const day=start.getDay();const diff=(day===0?-6:1-day);start.setDate(start.getDate()+diff);end=endOfDay(today)}
    if(ui.range==='mes'){start=new Date(today.getFullYear(),today.getMonth(),1,0,0,0,0);end=endOfDay(today)}
    if(ui.range==='mesAnterior'){start=new Date(today.getFullYear(),today.getMonth()-1,1,0,0,0,0);end=new Date(today.getFullYear(),today.getMonth(),0,23,59,59,999)}
    if(ui.range==='personalizado'){
      if(!ui.customStart)ui.customStart=ymd(today);
      if(!ui.customEnd)ui.customEnd=ymd(today);
      start=startOfDay(new Date(ui.customStart+'T00:00:00'));
      end=endOfDay(new Date(ui.customEnd+'T00:00:00'));
      if(start>end){const tmp=start;start=endOfDay(end);end=endOfDay(tmp)}
    }
    return {start,end};
  }
  function inRangeDate(value){if(!value)return false;const d=new Date(value);if(isNaN(d))return false;const r=rangeBounds();return d>=r.start&&d<=r.end}
  function oppDateFor(o,kind='created'){return kind==='closed'?(o.closedAt||o.updatedAt||o.createdAt):(o.createdAt||o.updatedAt||o.closedAt)}

  function renderStage(st,user,stage,opps){const sum=opps.reduce((a,o)=>a+num(o.monthlyValue),0);const first=getFirstStage(st,stage.funnelId);const canCreateHere=first&&Number(first.id)===Number(stage.id);return `<section class="stage" data-stage-id="${stage.id}"><div class="stage-head"><div><h3>${esc(stage.name)}</h3><small>${money(sum)} / mês</small></div><div class="stage-actions"><span class="count-dot">${opps.length}</span>${canCreateHere?`<button class="plus-mini" title="Adicionar oportunidade somente na etapa inicial" data-action="newOpp" data-stage="${stage.id}">+</button>`:''}</div></div><div class="dropzone" data-drop-stage="${stage.id}">${opps.length?opps.map(o=>renderOppCard(st,o)).join(''):'<div class="empty-stage">Sem oportunidades</div>'}</div></section>`}
  function renderOppCard(st,o){const tags=(o.tagIds||[]).map(id=>st.tags.find(t=>t.id===id)).filter(Boolean);const analysis=getOppAnalysis(st,o);return `<article class="opp-card" draggable="true" data-opp-id="${o.id}" data-action="openOpp"><div class="card-top"><h4>${esc(o.clientName)}</h4><span class="status-pill status-${o.status}">${o.status==='won'?'Ganho':o.status==='lost'?'Perda':'Aberto'}</span></div><div class="client">${esc(o.clientPhone||'Sem telefone')}</div><div class="doc mono">${esc(o.clientCpf||'Sem documento')}</div><div class="tags">${tags.slice(0,3).map(t=>`<span class="tag ${esc(t.color||'orange')}">${esc(t.name)}</span>`).join('')}${analysis?`<span class="tag ${analysis.status.includes('Aprov')?'green':analysis.status.includes('Reprov')?'red':'orange'}">${esc(analysis.status)}</span>`:''}${o.isBackofficeCopy?'<span class="tag blue">Backoffice</span>':''}</div><div class="value">${money(o.monthlyValue)}</div></article>`}

  function renderCredit(user){const st=getState();let reqs=visibleAnalysis(st,user);if(ui.creditStatus!=='todos')reqs=reqs.filter(r=>r.status===ui.creditStatus);const pending=reqs.filter(r=>['Enviado','Em análise'].includes(r.status)).length;const approved=reqs.filter(r=>['Aprovado','Liberado por exceção','Liberado com condição'].includes(r.status)).length;const reproved=reqs.filter(r=>['Reprovado','Reprovação mantida'].includes(r.status)).length;return `<div class="subbar"><div><h1>Análise Cadastral CPF/CNPJ</h1><p>Fluxo integrado vendedor → BKO → gerência, com anexo da consulta e histórico.</p></div><button class="btn btn-primary" data-action="newAnalysis">+ Nova Solicitação</button></div>

    <div class="toolbar mt14"><div class="filters"><select class="select" data-action="filterCredit"><option value="todos">Todos os status</option>${['Enviado','Em análise','Aprovado','Reprovado','Contestação enviada','Em análise gerencial','Liberado por exceção','Liberado com condição','Reprovação mantida'].map(s=>`<option ${ui.creditStatus===s?'selected':''}>${s}</option>`).join('')}</select></div><button class="btn btn-light" data-action="exportCredit">Exportar CSV</button></div>
    <div class="table-wrap"><table><thead><tr><th>Protocolo</th><th>Cliente</th><th>Documento</th><th>Vendedor</th><th>Produto</th><th>Status</th><th>Score</th><th>Risco</th><th>Atualizado</th></tr></thead><tbody>${reqs.length?reqs.sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt)).map(r=>`<tr class="clickable" data-action="openAnalysis" data-id="${r.id}"><td class="mono">${esc(r.protocol)}</td><td><strong>${esc(r.clientName)}</strong><br><span class="small">${esc(r.city||'-')}</span></td><td class="mono">${esc(r.cpf)}</td><td>${esc(r.sellerName||userName(st,r.requestedByUserId))}</td><td>${esc(r.product||'-')}</td><td>${analysisStatusBadge(r.status)}</td><td>${r.bko?.score??'-'}</td><td>${riskBadge(r.bko?.riskLevel)}</td><td>${fmtDate(r.updatedAt)}</td></tr>`).join(''):`<tr><td colspan="9"><div class="empty">Nenhuma solicitação encontrada.</div></td></tr>`}</tbody></table></div>`}

  function renderAdmin(user){const tabs=[['usuarios','Usuários'],['funis','Funis e Etapas'],['origens','Origens'],['planos','Categorias e Produtos'],['tags','Tags'],['motivos','Motivos Ganho/Perda']];return `<div class="subbar"><div><h1>Administração</h1><p>Cadastros básicos do sistema integrado. <span class="small">Alterações são salvas automaticamente neste navegador.</span></p></div><button class="btn btn-light" data-action="resetData">Restaurar dados de demonstração</button></div><div class="tabs">${tabs.map(t=>`<button class="tab ${ui.adminTab===t[0]?'active':''}" data-admin-tab="${t[0]}">${t[1]}</button>`).join('')}</div><div class="mt14">${adminTabContent()}</div>`}
  function adminTabContent(){const st=getState();if(ui.adminTab==='usuarios')return adminUsers(st);if(ui.adminTab==='funis')return adminFunnels(st);if(ui.adminTab==='origens')return adminOrigins(st);if(ui.adminTab==='planos')return adminPlans(st);if(ui.adminTab==='tags')return adminTags(st);if(ui.adminTab==='motivos')return adminOutcomes(st);return ''}

utton></div></div><div class="mt6">${ps.map(p=>{const used=st.opportunities.filter(o=>(o.planIds||[]).map(Number).includes(Number(p.id))).length;return `<div class="product-line"><span>${esc(p.name)}<br><small>${used} oportunidade(s) vinculada(s)</small></span><div class="item-actions"><small>${money(p.monthlyPrice)} / mês</small><span class="pill">${p.active!==false?'Ativo':'Inativo'}</span><button class="btn btn-light btn-sm" data-action="editPlan" data-id="${p.id}">Editar</button><button class="btn btn-red btn-sm" data-action="deletePlan" data-id="${p.id}">Excluir</button></div></div>`}).join('')||'<span class="small muted">Nenhum produto cadastrado nesta categoria.</span>'}</div></div>`}).join('')}</div></div></div>`

  function renderDashboard(user){

  function dashboardFilterField(label,options,action,value){return `<div class="field"><label>${label}</label><select class="select" data-action="${action}">${options.map(o=>`<option value="${esc(o.value)}" ${String(o.value)===String(value)?'selected':''}>${esc(o.label)}</option>`).join('')}</select></div>`}
  function normalizeDashboardFilters(st,user){
    ui.dashFunnel=ui.dashFunnel||'todos';ui.dashUser=ui.dashUser||'todos';ui.dashProduct=ui.dashProduct||'todos';ui.dashStatus=ui.dashStatus||'todos';ui.dashTab=ui.dashTab||'geral';
    const fids=dashboardFunnelOptions(st,user).map(o=>String(o.value));if(!fids.includes(String(ui.dashFunnel)))ui.dashFunnel='todos';
    const uids=dashboardUserOptions(st,user).map(o=>String(o.value));if(!uids.includes(String(ui.dashUser)))ui.dashUser='todos';

    const sids=dashboardStatusOptions().map(o=>String(o.value));if(!sids.includes(String(ui.dashStatus)))ui.dashStatus='todos';

  function dashboardFunnelOptions(st,user){return [{value:'todos',label:'Todos os funis'},...accessibleFunnels(st,user).map(f=>({value:f.id,label:f.name}))]}
  function dashboardUserOptions(st,user){
    if(!canSeeAll(user))return [{value:user.id,label:user.name}];

    const users=st.users.filter(u=>u.active!==false&&(ids.has(Number(u.id))||['vendedor','bko','gerencia'].includes(u.role))).sort((a,b)=>a.name.localeCompare(b.name));

    const ids=new Set();visibleOpps(st,user).forEach(o=>(o.planIds||[]).forEach(id=>ids.add(Number(id))));
    const plans=st.plans.filter(p=>p.active!==false&&ids.has(Number(p.id))).sort((a,b)=>a.name.localeCompare(b.name));

  function dashboardData(st,user){

    const opps=base.filter(dashDateInRangeForOpp);
    const created=base.filter(o=>inRangeDate(o.createdAt||o.updatedAt));
    const won=base.filter(o=>o.status==='won'&&inRangeDate(oppDateFor(o,'closed')));
    const lost=base.filter(o=>o.status==='lost'&&inRangeDate(oppDateFor(o,'closed')));
    const open=base.filter(o=>o.status==='open'&&inRangeDate(o.createdAt||o.updatedAt));
    const analyses=dashboardBaseAnalyses(st,user);
    const cpfApproved=analyses.filter(r=>isApprovedCreditStatus(r.status));
    const cpfRejected=analyses.filter(r=>['Reprovado','Reprovação mantida'].includes(r.status));
    const cpfPending=analyses.filter(r=>['Enviado','Em análise','Contestação enviada','Em análise gerencial'].includes(r.status));
    const soldValue=won.reduce((a,o)=>a+num(o.monthlyValue),0);

    const ticket=won.length?soldValue/won.length:0;
    const conv=created.length?won.length/created.length*100:0;

    const approval=analyses.length?cpfApproved.length/analyses.length*100:0;
    const rejection=analyses.length?cpfRejected.length/analyses.length*100:0;
    return {base,opps,created,won,lost,open,analyses,cpfApproved,cpfRejected,cpfPending,soldValue,potentialValue,ticket,conv,loss,approval,rejection};

  function monthMatrix(dateStr){
    const base=new Date(dateStr||new Date());const y=base.getFullYear(),m=base.getMonth();

    const days=[];for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);days.push(d)}
    return {year:y,month:m,days};
  }

  function googleOriginAllowed(){const allowed='__GOOGLE_AUTHORIZED_ORIGINS__'.split(',').map(s=>s.trim()).filter(Boolean);return allowed.length?allowed.includes(window.location.origin):true;}
  function googleAuthorizedOriginText(){return '__GOOGLE_AUTHORIZED_ORIGINS__'||window.location.origin;}

  function googleScopesForConfig(cfg){

  function ensureGoogleIdentity(){
    return new Promise((resolve,reject)=>{
      if(window.google?.accounts?.oauth2)return resolve();
      let script=document.querySelector('script[data-google-identity]');
      if(!script){script=document.createElement('script');script.src='https://accounts.google.com/gsi/client';script.async=true;script.defer=true;script.dataset.googleIdentity='true';document.head.appendChild(script);}
      const started=Date.now();
      const timer=setInterval(()=>{if(window.google?.accounts?.oauth2){clearInterval(timer);resolve();}else if(Date.now()-started>10000){clearInterval(timer);reject(new Error('Não foi possível carregar o login do Google.'));}},150);
    });
  }
  async function connectGoogleAgenda(){
    if(shouldShowLocalhostNotice()){openLocalhostNotice();return;}
    const st=getState();const user=getUser();const appCfg=getGoogleCalendarAppConfig(st);
    const clientId=appCfg.clientId||DEFAULT_GOOGLE_CALENDAR_CLIENT_ID;
    if(!clientId){
      closeModal();
      openModal(`<div class="modal small"><div class="modal-head"><h2>Configuração técnica necessária</h2><button class="x" data-action="closeModal">×</button></div><div class="modal-body"><div class="google-box"><strong>A tela de login Google já está pronta, mas este arquivo de teste ainda não possui o OAuth Client ID da Sulnet.</strong><p class="small mb0">Na publicação final, esse Client ID fica configurado internamente no código/servidor. O usuário final verá apenas o botão Continuar com Google.</p></div></div></div>`);
      return;
    }
    if(!googleOriginAllowed()){
      closeModal();
      openModal(`<div class="modal small"><div class="modal-head"><h2>Origem não autorizada no Google</h2><button class="x" data-action="closeModal">×</button></div><div class="modal-body"><div class="google-box"><strong>O OAuth está configurado, mas o Google só autorizou a origem:</strong><p class="small mono">${esc(googleAuthorizedOriginText())}</p><p class="small mb0">Para testar esta integração, abra o sistema em <strong>http://localhost:3000</strong>. O link sandbox/arquivo local pode ser bloqueado pelo Google por não estar na lista de origens autorizadas.</p></div></div></div>`);
      return;
    }
    try{
      await ensureGoogleIdentity();
      const tokenClient=google.accounts.oauth2.initTokenClient({
        client_id:clientId,
        scope:googleScopesForConfig(appCfg),
        prompt:'consent select_account',
        callback:(resp)=>{
          if(resp.error){toast('Google não autorizou a conexão: '+resp.error,'error');return;}
          const st2=getState();st2.googleCalendarConfig=st2.googleCalendarConfig||{};
          st2.googleCalendarConfig[user.id]={connected:true,accessToken:resp.access_token,calendarId:appCfg.calendarId||'primary',syncMode:appCfg.syncMode||'Ler eventos',tokenSavedAt:now(),updatedAt:now()};
          setState(st2);closeModal();syncGoogleAgenda(resp.access_token);
        }
      });
      tokenClient.requestAccessToken({prompt:'consent select_account'});
    }catch(err){console.error(err);toast('Não foi possível abrir o login do Google: '+(err?.message||err),'error');}
  }
  async function syncGoogleAgenda(tokenOverride=''){
    const st=getState();const user=getUser();const cfg=(st.googleCalendarConfig||{})[user.id]||{};const appCfg=getGoogleCalendarAppConfig(st);
    const token=tokenOverride||cfg.accessToken;
    if(!token){toast('Conecte sua conta Google primeiro.','error');return;}
    const calendarId=encodeURIComponent(cfg.calendarId||appCfg.calendarId||'primary');
    const min=new Date();min.setDate(min.getDate()-30);
    const max=new Date();max.setFullYear(max.getFullYear()+1);
    const url=`https://www.googleapis.com/calendar/v3/calendars/${calendarId}/events?singleEvents=true&orderBy=startTime&timeMin=${encodeURIComponent(min.toISOString())}&timeMax=${encodeURIComponent(max.toISOString())}`;
    try{
      toast('Buscando eventos no Google Agenda...');
      const res=await fetch(url,{headers:{Authorization:'Bearer '+token}});
      if(res.status===401){toast('A autorização Google expirou. Conecte novamente.','error');st.googleCalendarConfig[user.id]={...cfg,connected:false,accessToken:''};setState(st);render();return;}
      if(!res.ok)throw new Error('Google Calendar API retornou erro '+res.status);
      const data=await res.json();const items=data.items||[];
      st.calendarEvents=st.calendarEvents||[];
      const keepLocal=st.calendarEvents.filter(ev=>!(ev.source==='google'&&Number(ev.userId)===Number(user.id)));
      const imported=items.filter(it=>it.status!=='cancelled').map(it=>{
        st.counters.calendar=(st.counters.calendar||0)+1;
        const start=it.start?.dateTime||it.start?.date||new Date().toISOString();
        const end=it.end?.dateTime||it.end?.date||start;
        return {id:st.counters.calendar,googleEventId:it.id,userId:user.id,title:it.summary||'Evento Google Agenda',type:'Google Agenda',start,end,location:it.location||'',description:it.description||'',source:'google',status:'Confirmado',createdAt:now(),updatedAt:now()};
      });
      st.calendarEvents=[...keepLocal,...imported];
      st.googleCalendarConfig[user.id]={...cfg,connected:true,accessToken:token,calendarId:cfg.calendarId||appCfg.calendarId||'primary',lastSync:now()};
      setState(st);render();toast(`${imported.length} evento(s) importado(s) do Google Agenda.`);
    }catch(err){console.error(err);toast('Não foi possível buscar o Google Agenda: '+(err?.message||err),'error');}
  }

    if(!fileValue)return null;
    if(typeof fileValue==='string')return fileValue.trim()?{name:fileValue.trim(),type:'',dataUrl:''}:null;
    if(typeof fileValue==='object')return {name:fileValue.name||'',type:fileValue.type||'',dataUrl:fileValue.dataUrl||''};
    return null;
  }
  function fileDisplayName(fileValue){return normalizeStoredFile(fileValue)?.name||''}
  function registerPreviewFile(fileValue){
    const file=normalizeStoredFile(fileValue);
    if(!file?.dataUrl)return '';
    const key='pv_'+Math.random().toString(36).slice(2,10);
    previewCache[key]=file;
    return key;
  }
  function fileCurrentHtml(label,fileValue){
    const file=normalizeStoredFile(fileValue);
    if(!file?.name)return '<div class="upload-meta"><small>Selecione o arquivo para ficar registrado nesta oportunidade.</small></div>';
    const key=registerPreviewFile(file);
    return `<div class="upload-meta"><small>Arquivo vinculado em ${esc(label)}</small><div class="upload-file-name">${esc(file.name)}</div><div class="upload-file-actions">${key?`<button type="button" class="btn btn-light btn-xs" data-action="previewFile" data-preview-key="${key}">Visualizar</button>`:''}<span class="muted">${key?'Clique para abrir o documento anexado.':'Visualização disponível para novos arquivos salvos nesta versão.'}</span></div></div>`;
  }
  function fileFieldCard(label,inputName,fileValue){
    return `<div class="upload-card"><div class="upload-top"><label>${esc(label)}</label><span class="upload-hint">PNG, JPG, JPEG ou PDF</span></div><input type="file" name="${esc(inputName)}" accept=".pdf,image/*">${fileCurrentHtml(label,fileValue)}</div>`;
  }
  function previewFileModalByKey(key){
    const file=previewCache[key];
    if(!file?.dataUrl){toast('Este arquivo ainda não possui visualização disponível. Reenvie e salve novamente nesta versão.','warn');return;}
    const isPdf=String(file.type||'').includes('pdf')||String(file.name||'').toLowerCase().endsWith('.pdf');
    const media=isPdf?`<iframe class="preview-iframe" src="${esc(file.dataUrl)}"></iframe>`:`<img class="preview-media" src="${esc(file.dataUrl)}" alt="${esc(file.name||'Documento')}">`;
    openModal(`<div class="modal preview-modal"><div class="modal-head"><h2>Visualizar documento</h2><button class="x" data-action="closeModal">×</button></div><div class="modal-body"><div class="preview-wrap"><div class="filebox mb-product"><strong>${esc(file.name||'Arquivo')}</strong></div>${media}</div><div class="footer-actions"><button type="button" class="btn btn-light" data-action="closeModal">Fechar</button></div></div></div>`);
  }
  function readFileAsStoredRecord(file){
    return new Promise((resolve,reject)=>{
      if(!file)return resolve(null);
      const reader=new FileReader();
      reader.onload=()=>resolve({name:file.name||'',type:file.type||'',dataUrl:String(reader.result||'')});
      reader.onerror=()=>reject(reader.error||new Error('Falha ao ler arquivo.'));
      reader.readAsDataURL(file);
    });
  }
  async function fileRecordFromForm(form,fileInputName,currentValue){
    const file=form.querySelector(`input[name="${fileInputName}"]`)?.files?.[0];
    if(file)return await readFileAsStoredRecord(file);
    return normalizeStoredFile(currentValue)||'';
  }
  async function updateUploadCardPreview(input){
    const card=input?.closest('.upload-card');
    const meta=card?.querySelector('.upload-meta');

    const file=input.files?.[0];
    if(!file){meta.innerHTML='<small>Selecione o arquivo para ficar registrado nesta oportunidade.</small>';return;}
    try{
      const record=await readFileAsStoredRecord(file);
      const key=registerPreviewFile(record);
      meta.innerHTML=`<small>Arquivo selecionado</small><div class="upload-file-name">${esc(record.name)}</div><div class="upload-file-actions">${key?`<button type="button" class="btn btn-light btn-xs" data-action="previewFile" data-preview-key="${key}">Visualizar</button>`:''}<span class="muted">Pré-visualização antes de salvar.</span></div>`;
    }catch(err){console.error(err);meta.innerHTML='<small>Não foi possível gerar a visualização deste arquivo.</small>'}
  }

  function updateOpportunityProductFields(form){
    if(!form||form.id!=='oppForm')return;
    const st=getState();
    const catId=form.querySelector('[name="categoryId"]')?.value||'';
    const planSelected=!!form.querySelector('[name="planIds"]')?.value;
    const catName=String(categoryNameById(st,catId)).toUpperCase();
    const fibraBox=form.querySelector('[data-product-fields="fibra"]');
    if(fibraBox)fibraBox.classList.toggle('hidden',!(catName==='FIBRA'&&planSelected));
    const mobileBox=form.querySelector('[data-product-fields="movel"]');
    const isMobile=normName(catName)==='TELEFONIA MOVEL';
    if(mobileBox)mobileBox.classList.toggle('hidden',!(isMobile&&planSelected));
    const fixaBox=form.querySelector('[data-product-fields="fixa"]');
    const isFixa=normName(catName)==='TELEFONIA FIXA';
    if(fixaBox)fixaBox.classList.toggle('hidden',!(isFixa&&planSelected));
    const val=(name)=>form.querySelector(`input[name="${name}"]:checked`)?.value||'';
    form.querySelectorAll('[data-cond="fibraTaxaSim"]').forEach(el=>el.classList.toggle('hidden',val('fibraTaxaAtivacao')!=='Sim'));
    form.querySelectorAll('[data-cond="fibraPagamentoBoleto"]').forEach(el=>el.classList.toggle('hidden',val('fibraFormaPagamento')!=='Boleto'));
    form.querySelectorAll('[data-cond="fibraUnificarNao"]').forEach(el=>el.classList.toggle('hidden',val('fibraUnificarFaturas')!=='Não'));
    form.querySelectorAll('[data-cond="fibraMetragemSim"]').forEach(el=>el.classList.toggle('hidden',val('fibraMetragemExcedente')!=='Sim'));
    const mobileType=val('mobileTipo')||'Número novo';
    form.querySelectorAll('[data-cond="mobileNumeroNovo"]').forEach(el=>el.classList.toggle('hidden',mobileType!=='Número novo'));
    form.querySelectorAll('[data-cond="mobilePortabilidade"]').forEach(el=>el.classList.toggle('hidden',mobileType!=='Número Portabilidade'));

  function prospectTypeMeta(type=''){
    const n=normName(type);
    if(n.includes('WHATS'))return {icon:'💬',cls:'whatsapp',channel:'WhatsApp'};
    if(n.includes('VISITA')||n.includes('PRESENCIAL'))return {icon:'🚶',cls:'visit',channel:'Presencial'};
    if(n.includes('REUNIAO'))return {icon:'👥',cls:'meeting',channel:'Presencial'};
    if(n.includes('FOLLOW'))return {icon:'⏰',cls:'follow',channel:'WhatsApp'};
    if(n.includes('PROPOSTA'))return {icon:'📄',cls:'proposal',channel:'WhatsApp'};
    if(n.includes('SEM RETORNO')||n.includes('NAO ATENDEU')||n.includes('NÃO ATENDEU'))return {icon:'🚫',cls:'noresponse',channel:'Ligação'};
    if(n.includes('OBJECAO')||n.includes('OBJEÇÃO'))return {icon:'⚠️',cls:'follow',channel:'WhatsApp'};
    if(n.includes('LIGACAO')||n.includes('LIGAÇÃO'))return {icon:'📞',cls:'phone',channel:'Ligação'};
    return {icon:'📝',cls:'note',channel:'Outro'};
  }

  function prospectStatsHtml(opp={}){

  function fd(form){return Object.fromEntries(new FormData(form).entries())}

  function isApprovedCreditStatus(status){return ['Aprovado','Liberado por exceção','Liberado com condição'].includes(String(status||''))}
  function isCreditRejectedStatus(status){return ['Reprovado','Reprovação mantida'].includes(String(status||''))}

  function missingBaseLeadFields(opp){
    const missing=[];
    if(!String(opp.clientCpf||'').trim()||digits(opp.clientCpf).length<11)missing.push('CPF/CNPJ');
    if(!String(opp.clientName||'').trim())missing.push('nome do cliente');
    if(!String(opp.clientBirthDate||'').trim())missing.push('data de nascimento/abertura');
    if(!String(opp.cep||'').trim())missing.push('CEP');
    if(!String(opp.street||'').trim())missing.push('rua');
    if(!String(opp.addressNumber||'').trim())missing.push('número');
    if(!String(opp.neighborhood||'').trim())missing.push('bairro');
    if(!String(opp.city||'').trim())missing.push('cidade');
    if(!String(opp.uf||'').trim())missing.push('UF');
    return missing;
  }
  function validateOpportunityMove(st,opp,targetStageId){
    const currentFirst=getFirstStage(st,opp.funnelId);
    const targetStage=st.stages.find(s=>Number(s.id)===Number(targetStageId));
    if(!targetStage)return {ok:false,message:'Etapa de destino não encontrada.'};
    if(currentFirst&&Number(opp.stageId)===Number(currentFirst.id)&&Number(targetStageId)!==Number(currentFirst.id)){
      const missing=missingBaseLeadFields(opp);
      if(missing.length)return {ok:false,message:'Para sair da etapa inicial, preencha antes: '+missing.join(', ')+'.'};
      if(!creditApprovedForOpp(st,opp))return {ok:false,message:'Para sair da etapa inicial, a análise de crédito precisa estar aprovada/liberada pelo BKO. Status atual: '+creditStatusForOpp(st,opp)+'.'};
    }
    return {ok:true};
  }
  function requireValue(value,label,missing){if(value===undefined||value===null||String(value).trim()==='')missing.push(label)}
  function requireFile(value,label,missing){const file=normalizeStoredFile(value);if(!String(file?.name||value||'').trim())missing.push(label)}
  function validateOpportunityCanWin(st,opp){
    if(!opp)return {ok:false,message:'Oportunidade não encontrada.'};
    const missing=missingBaseLeadFields(opp);
    if(!opp.categoryId)missing.push('tipo de contratação');
    if(!(opp.planIds||[]).length)missing.push('produto/plano');
    if(!creditApprovedForOpp(st,opp))missing.push('análise de crédito aprovada/liberada');
    const cat=normName(categoryNameById(st,opp.categoryId));
    const info=opp.productInfo||{};
    if(cat==='FIBRA'){
      const f=info.fibra||{};
      requireValue(f.vencimento,'vencimento',missing);
      requireValue(f.taxaAtivacao,'taxa de ativação',missing);
      if(f.taxaAtivacao==='Sim')requireValue(f.taxaValor,'valor da taxa de ativação',missing);
      requireValue(f.formaPagamento,'forma de pagamento',missing);
      if(f.formaPagamento==='Boleto'&&!(f.envioFatura||[]).length)missing.push('envio da fatura');
      requireValue(f.unificarFaturas,'unificar faturas',missing);
      if(f.unificarFaturas==='Não')requireValue(f.unificarMotivo,'motivo para não unificar faturas',missing);
      requireValue(f.metragemExcedente,'metragem excedente',missing);
      if(f.metragemExcedente==='Sim')requireValue(f.metragem,'metragem excedente',missing);
      requireValue(f.reservaData,'data da reserva',missing);
      requireValue(f.reservaHora,'hora da reserva',missing);
      requireFile(f.documentoFoto,'documento com foto',missing);
      requireFile(f.selfieDocumento,'selfie com documento',missing);
      requireFile(f.printAceite,'print da conversa com aceite',missing);
    }
    if(cat==='TELEFONIA MOVEL'){
      const m=info.movel||{};
      const tipo=m.tipoContratacao||'Número novo';
      requireValue(tipo,'tipo de contratação móvel',missing);
      if(tipo==='Número novo'){
        requireValue(m.novoIccid,'ICCID do número novo',missing);
        requireValue(m.numeroNovo,'número novo',missing);
      }
      if(tipo==='Número Portabilidade'){
        requireValue(m.portIccid,'ICCID da portabilidade',missing);
        requireValue(m.numeroPortado,'número portado',missing);
        requireValue(m.portTitular,'portabilidade em nome do titular',missing);
        requireValue(m.portNomeTitular,'nome do titular da portabilidade',missing);
        requireValue(m.portCpfCnpj,'CPF/CNPJ do titular da portabilidade',missing);
        requireValue(m.portData,'data da portabilidade',missing);
      }
      if(tipo==='M2M'){
        const qty=Number(m.m2mQuantidade||0);
        if(!qty||qty<1)missing.push('quantidade de chip M2M');
        const iccids=Array.isArray(m.m2mIccids)?m.m2mIccids:[];
        for(let i=0;i<qty;i++)if(!String(iccids[i]||'').trim())missing.push('ICCID M2M '+(i+1));
      }
      requireValue(m.vencimento,'vencimento',missing);
      requireValue(m.taxaAtivacao,'taxa de ativação',missing);
      if(m.taxaAtivacao==='Sim')requireValue(m.taxaValor,'valor da taxa de ativação',missing);
      requireValue(m.formaPagamento,'forma de pagamento',missing);
      if(m.formaPagamento==='Boleto'&&!(m.envioFatura||[]).length)missing.push('envio da fatura');
      requireValue(m.unificarFaturas,'unificar faturas',missing);
      if(m.unificarFaturas==='Não')requireValue(m.unificarMotivo,'motivo para não unificar faturas',missing);
      requireFile(m.documentoFoto,'documento com foto',missing);
      requireFile(m.selfieDocumento,'selfie com documento',missing);
      requireFile(m.printAceite,'print da conversa com aceite',missing);
    }
    if(cat==='TELEFONIA FIXA'){
      const f=info.fixa||{};
      const tipo=f.tipoContratacao||'Número novo';
      requireValue(tipo,'tipo de contratação fixa',missing);
      if(tipo==='Número novo'){
        requireValue(f.numeroNovo,'número novo',missing);
        if(digits(f.numeroNovo).length!==10)missing.push('número novo com 10 dígitos');
        requireValue(f.numeroConexaoNovo,'número da conexão para ativação',missing);
      }
      if(tipo==='Número Portabilidade'){
        requireValue(f.numeroPortado,'número a ser portado',missing);
        if(digits(f.numeroPortado).length!==10)missing.push('número a ser portado com 10 dígitos');
        requireValue(f.portTitular,'portabilidade em nome do titular',missing);
        requireValue(f.portNomeTitular,'nome do titular da portabilidade',missing);
        requireValue(f.portCpfCnpj,'CPF/CNPJ do titular da portabilidade',missing);
        requireValue(f.portData,'data da portabilidade',missing);
        requireValue(f.numeroConexaoPort,'número da conexão para ativação',missing);
        requireFile(f.termoPortabilidade,'termo de portabilidade',missing);
      }
      requireValue(f.equipamento,'equipamento entrega',missing);
      requireValue(f.reservaData,'data da reserva',missing);
      requireValue(f.reservaHora,'hora da reserva',missing);
      requireValue(f.vencimento,'vencimento',missing);
      requireValue(f.taxaAtivacao,'taxa de ativação',missing);
      if(f.taxaAtivacao==='Sim')requireValue(f.taxaValor,'valor da taxa de ativação',missing);
      requireValue(f.formaPagamento,'forma de pagamento',missing);
      if(f.formaPagamento==='Boleto'&&!(f.envioFatura||[]).length)missing.push('envio da fatura');
      requireValue(f.unificarFaturas,'unificar faturas',missing);
      if(f.unificarFaturas==='Não')requireValue(f.unificarMotivo,'motivo para não unificar faturas',missing);
      requireFile(f.documentoFoto,'documento com foto',missing);
      requireFile(f.selfieDocumento,'selfie com documento',missing);
      requireFile(f.printAceite,'print da conversa com aceite',missing);
    }
    if(missing.length)return {ok:false,message:'Não é possível marcar como GANHO. Preencha antes: '+missing.join(', ')+'.'};
    return {ok:true};
  }
  function moveOppToCreditReleasedStage(st,opp,actor='Sistema'){
    if(!opp||opp.status!=='open'||opp.isBackofficeCopy)return false;
    const stage=getCreditReleasedStage(st,opp.funnelId); if(!stage)return false;
    if(Number(opp.stageId)===Number(stage.id))return false;
    const missing=missingBaseLeadFields(opp);
    if(missing.length){opp.history=opp.history||[];opp.history.push({at:now(),actor,action:'Análise aprovada, mas a oportunidade não avançou porque faltam dados básicos: '+missing.join(', ')+'.'});return false;}
    opp.stageId=stage.id;opp.funnelId=stage.funnelId;opp.updatedAt=now();opp.history=opp.history||[];opp.history.push({at:now(),actor,action:'Análise de crédito aprovada/liberada. Oportunidade movida automaticamente para '+stage.name+'.'});return true;
  }

  function download(name,content){const blob=new Blob([content],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();a.remove()}
  function exportCredit(){const st=getState();const rows=[['Protocolo','Cliente','Documento','Vendedor','Produto','Status','Score','Risco','Criado','Atualizado'],...visibleAnalysis(st,getUser()).map(r=>[r.protocol,r.clientName,r.cpf,r.sellerName,r.product,r.status,r.bko?.score||'',r.bko?.riskLevel||'',fmtDate(r.createdAt),fmtDate(r.updatedAt)])];download('analises_sulnet.csv',toCSV(rows))}
  function exportOpps(){const st=getState();const rows=[['Protocolo','Cliente','Documento','Telefone','Funil','Etapa','Vendedor','Cidade','Valor Mensal','Status'],...visibleOpps(st,getUser()).map(o=>[o.protocol,o.clientName,o.clientCpf,o.clientPhone,funnelName(st,o.funnelId),stageName(st,o.stageId),userName(st,o.assignedUserId),o.city,o.monthlyValue,o.status])];download('oportunidades_sulnet.csv',toCSV(rows))}

  render();
})();
